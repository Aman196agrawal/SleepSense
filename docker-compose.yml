version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Local development stack — mirrors the production architecture:
#   PostgreSQL  → primary relational store
#   Redis       → refresh-token cache, rate-limit counters
#   Kafka       → async event bus (chunk.uploaded → ML inference)
#   InfluxDB    → per-chunk snore event time-series
#   MinIO       → S3-compatible object store for audio files
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  SECRET_KEY: ${SECRET_KEY:-product-gem-dev-secret-key-32chars!!}

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sleepsense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sleepsense"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Kafka (KRaft mode — no ZooKeeper) ───────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft single-node setup
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Topics pre-created for clarity
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_NUM_PARTITIONS: 3
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka topic init ─────────────────────────────────────────────────────────
  kafka-init:
    image: bitnami/kafka:3.7
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      sh -c "
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic audio.chunk.uploaded --partitions 3 --replication-factor 1 &&
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic session.ended       --partitions 3 --replication-factor 1 &&
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ml.inference.result --partitions 3 --replication-factor 1 &&
        echo 'Kafka topics created.'
      "
    restart: "no"

  # ── InfluxDB ─────────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: devpassword123
      DOCKER_INFLUXDB_INIT_ORG: sleepsense
      DOCKER_INFLUXDB_INIT_BUCKET: snore_events
      DOCKER_INFLUXDB_INIT_RETENTION: 0
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-influxdb-token-sleepsense-2024
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── MinIO (S3-compatible object store) ───────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console  (http://localhost:9001  admin/minioadmin)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MinIO bucket init ─────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/audio-chunks &&
        mc mb --ignore-existing local/ml-models &&
        mc anonymous set download local/ml-models &&
        echo 'MinIO buckets ready.'
      "
    restart: "no"

  # ── Auth Service ──────────────────────────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://postgres:devpassword@postgres:5432/sleepsense
      REDIS_URL: redis://redis:6379
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Analytics Service ─────────────────────────────────────────────────────────
  analytics-service:
    build: ./services/analytics-service
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://postgres:devpassword@postgres:5432/sleepsense
      REDIS_URL: redis://redis:6379
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: dev-influxdb-token-sleepsense-2024
      INFLUXDB_ORG: sleepsense
      INFLUXDB_BUCKET: snore_events
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: audio-chunks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  influxdb_data:
  minio_data:
